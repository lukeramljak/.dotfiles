# Disable amdgpu runtime power management to fix S3 suspend on the
# Radeon RX 6700 XT (Navi 22). With runpm on, the dGPU autosuspends to
# D3cold and its SMU fails to resume when system-suspend needs it
# (resume of IP block <smu> failed -62), aborting the whole suspend.
# Gigabyte Z590 UD AC
options amdgpu runpm=0
